name: Build, sign, and deploy

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version of the artifact to deploy
        required: true
      ext:
        description: "Package name suffix appended to edition (e.g. TEST). Leave empty for production builds."
        required: false
        default: ""
  push:
    branches:
      - master
      - 'hotfix/**'

permissions:
  id-token: write
  contents: read

defaults:
  run:
    shell: bash

env:
  ARTIFACT_NAME: aerospike-server
  AWS_ROLE: arn:aws:iam::360255567471:role/sso/assumed/iac/AerospikeDownloadArtifactsAutomation
  JFROG_PROJECT: database
  JFROG_URL: https://aerospike.jfrog.io
  ORG: citrusleaf
  S3_BUCKET: aerospike-qe-build

jobs:
  setup:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    outputs:
      VERSION: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || steps.set_env.outputs.version }}
      BUNDLE_VERSION: ${{ steps.set_env.outputs.bundle_version }}
      COUNT:   ${{ steps.set_env.outputs.count }}
      RELEASE: ${{ steps.set_env.outputs.release }}
      DISTROS: ${{ steps.distros.outputs.distros }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: set env 
        id: set_env
        env:
          INPUT_VERSION: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || '' }}
        run: |
          set -euo pipefail
          # Align with build/version: no *.*.*.*-start tags; semver-like x.y.z.w tags + --long on feature branches.
          if [[ "$GITHUB_REF_NAME" == "master" || "$GITHUB_REF_NAME" =~ ^hotfix/ ]]; then
            # Strip git describe --long suffix (-<n>-g<hash>); do not use cut -f1 — hyphenated tags (e.g. 8.0.0.1-rc1) would truncate wrong.
            version="$(git describe --first-parent --tags --always --long | sed 's/-[0-9]*-g[0-9a-f]*$//')"
          else
            version="$(git describe --first-parent --tags --always --abbrev=9 --long --match '[0-9]*.[0-9]*.[0-9]*.[0-9]*' 2>/dev/null)"
            if [[ "$version" != *-*-* ]]; then
              version="$(git describe --first-parent --tags --always --abbrev=9 --long 2>/dev/null)"
            fi
          fi
          if [[ -z "$version" ]]; then
            version="$(git rev-parse --short=9 HEAD)"
          fi
          if [[ -n "${INPUT_VERSION:-}" ]]; then
            version="$INPUT_VERSION"
          fi
          count=$(bash .github/bin/artifact_count.bash)
          release=$(bash build/version)
          if [[ ! "$GITHUB_REF_NAME" =~ ^[a-zA-Z0-9._/\-]+$ ]]; then
            echo "ERROR: GITHUB_REF_NAME contains unsafe characters: '$GITHUB_REF_NAME'" >&2
            exit 1
          fi
          branch_prefix="${GITHUB_REF_NAME//\//-}"
          bundle_version="TEST-${branch_prefix}-${version}"
          {
            echo "version=$version"
            echo "bundle_version=$bundle_version"
            echo "count=$count"
            echo "release=$release"
          } >> "$GITHUB_OUTPUT"

      - name: Set distro list
        id: distros
        run: |
          echo 'distros=["amzn2023","debian12","debian13","el10","el8","el9","ubuntu22.04","ubuntu24.04"]' >> "$GITHUB_OUTPUT"

  build-artifacts:
    needs: setup
    if: github.repository_owner == 'citrusleaf' && github.event_name == 'push'
    strategy:
      fail-fast: false
      matrix:
        host: [ubuntu-24.04, ubuntu-24.04-arm]
        distro: ${{ fromJson(needs.setup.outputs.DISTROS) }}

    runs-on: ${{ matrix.host }}
    # Pinned base images for reproducible builds; update periodically for security and toolchain updates.
    # Pinned base images; el8 works with OpenSSL 1.1 or 3 via enterprise tls_ee compat (TLS_GET_PEER_CERT).
    container: >-
      ${{ matrix.distro == 'ubuntu24.04' && 'ubuntu:24.04' ||
        matrix.distro == 'ubuntu22.04' && 'ubuntu:22.04' ||
        matrix.distro == 'ubuntu20.04' && 'ubuntu:20.04' ||
        matrix.distro == 'el8' && 'registry.access.redhat.com/ubi8/ubi-minimal:8.10' ||
        matrix.distro == 'el9' && 'registry.access.redhat.com/ubi9/ubi-minimal:9.4' ||
        matrix.distro == 'el10' && 'redhat/ubi10:10.0' ||
        matrix.distro == 'debian11' && 'debian:bullseye-20241223-slim' ||
        matrix.distro == 'debian12' && 'debian:bookworm-20241223-slim' ||
        matrix.distro == 'debian13' && 'debian:trixie-20241223-slim' ||
        matrix.distro == 'amzn2023' && 'amazonlinux:2023.4.20240401.1' }}

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Fetch app token
        id: app-token
        # v3 line is Node24-ready; requires modern runner (GH-hosted Ubuntu runners satisfy this).
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          app-id: ${{ vars.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Install prereqs
        run: |
          set -euo pipefail

          case "${{ matrix.distro }}" in
            ubuntu*|debian*)
              apt-get update && apt-get install -y git ca-certificates
              ;;
            el*|amzn*)
              command -v dnf >/dev/null || microdnf install -y dnf
              dnf -y install git ca-certificates libyaml-devel
              if [[ "${{ matrix.distro }}" == "el8" ]]; then
                dnf -y install perl-IPC-Cmd perl-Time-Piece python3
              fi
              ;;
          esac

          git --version
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Checkout aerospike-server
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: citrusleaf/aerospike-server
          submodules: true
          path: aerospike-server
          fetch-depth: 0
          fetch-tags: true
          token: ${{ steps.app-token.outputs.token }}

      - name: Install required packages
        run: |
          bash "$GITHUB_WORKSPACE/aerospike-server/.github/bin/install_deps.bash" "${{ matrix.distro }}"

      - name: Configure git credential rewriting
        env:
          TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          dest="https://x-access-token:${TOKEN}@github.com/"
          git config --global "url.${dest}.insteadOf" "https://github.com/"
          git config --global --add "url.${dest}.insteadOf" "git@github.com:"
          git config --global --add "url.${dest}.insteadOf" "ssh://git@github.com/"
          git config --global --add "url.${dest}.insteadOf" "git://github.com/"
          git config --global --add safe.directory "$GITHUB_WORKSPACE/aerospike-server"

      - name: Checkout aerospike-server-enterprise
        env:
          REF: ${{ github.head_ref || github.ref_name }}
        run: >
          bash aerospike-server/.github/bin/checkout_private_repo.bash
          citrusleaf/aerospike-server-enterprise
          aerospike-server/modules/ee
          "$REF"

      - name: Checkout aerospike-server-fips
        env:
          REF: ${{ github.head_ref || github.ref_name }}
        run: >
          bash aerospike-server/.github/bin/checkout_private_repo.bash
          citrusleaf/aerospike-server-fips
          aerospike-server/modules/fips
          "$REF"

      - name: Remove git credential rewriting
        if: always()
        env:
          TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          git config --global --unset-all \
            "url.https://x-access-token:${TOKEN}@github.com/.insteadOf" || true

      - name: Build and package
        working-directory: aerospike-server
        env:
          DISTRO: ${{ matrix.distro }}
          # Expose the host arch under two names:
          #   MATRIX_HOST - used by the YAML `if [[ ... ]]` below; aliased to dodge shellcheck SC2153
          #                 (shellcheck can't see that the lowercase matrix.host token drives this env).
          #   HOST        - required by .github/bin/build_edition.bash (see script header comment); the
          #                 fips branch inside do_edition() uses ${HOST:?...} to skip fips on arm64.
          MATRIX_HOST: ${{ matrix.host }}
          HOST: ${{ matrix.host }}
          EXT: ${{ github.event_name == 'push' && 'TEST' || github.event.inputs.ext }}
        run: |
          if [[ "${MATRIX_HOST}" == *arm* ]]; then
            bash .github/bin/build_edition.bash -e community -e enterprise
          else
            bash .github/bin/build_edition.bash
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: unsigned-artifacts-${{ needs.setup.outputs.VERSION }}-${{ matrix.distro }}-${{ contains(matrix.host, 'arm') && 'aarch64' || 'x86_64' }}
          path: |
            aerospike-server/pkg/packages/*.deb
            aerospike-server/pkg/packages/*.rpm
          retention-days: 1

  organize-built-artifacts:
    needs: [build-artifacts, setup]
    if: ${{ always() && needs.build-artifacts.result == 'success' }}
    runs-on: ubuntu-24.04
    outputs:
      PACKAGE_VERSION: ${{ steps.extract_package_version.outputs.package_version }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout (for extract_version.bash)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: .github/bin/extract_version.bash
          sparse-checkout-cone-mode: false

      - name: Download All Matrix Artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: build-artifacts
          pattern: unsigned-artifacts-${{ needs.setup.outputs.VERSION }}*
          merge-multiple: true

      - name: List download files
        run: find build-artifacts

      - name: Extract package version from artifacts
        id: extract_package_version
        run: |
          set -euo pipefail
          pkg_version=$(bash .github/bin/extract_version.bash build-artifacts)
          echo "package_version=$pkg_version" >> "$GITHUB_OUTPUT"
          echo "Extracted PACKAGE_VERSION: $pkg_version"

      - name: Upload packaged Artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: unsigned-artifacts-${{ needs.setup.outputs.VERSION }}
          path: |
            build-artifacts/**/*.deb
            build-artifacts/**/*.rpm
          overwrite: true
          retention-days: 1

  download-s3-artifacts:
    needs: setup
    if: >
        github.repository_owner == 'citrusleaf' &&
        github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    outputs:
      PACKAGE_VERSION: ${{ steps.extract_package_version.outputs.package_version }}
      FULL_PACKAGE_VERSION: ${{ steps.extract_package_version.outputs.package_version }}
    env:
      VERSION: ${{ needs.setup.outputs.VERSION }}
      COUNT: ${{ needs.setup.outputs.COUNT }}
      RELEASE: ${{ needs.setup.outputs.RELEASE }}

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Install GNU parallel
        run: sudo apt-get update && sudo apt-get install -y parallel

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37  # v6.1.0
        with:
          role-to-assume: ${{ env.AWS_ROLE }}
          role-session-name: aerospike-download-artifacts
          aws-region: us-west-1

      # AWS credentials from Configure step above last ~4 hour. Keep retries within that window so token does not expire; use "Re-run failed jobs" in Actions UI for a fresh token if this step fails.
      - name: Download artifacts from QE server (retry until complete)
        uses: step-security/retry@38808b4332b98bb36ca031abff0c100231608288  # v4.0.0
        env:
          GH_EVENT: ${{ github.event_name }}
          S3_PATH: "s3://${{ env.S3_BUCKET }}/${{ env.ORG }}/${{ env.ARTIFACT_NAME }}/${{ env.VERSION }}/build/"
        with:
          timeout_minutes: 240
          max_attempts: 120
          retry_on: error
          retry_wait_seconds: 120
          command: bash .github/bin/download_artifacts.bash

      - name: List download files
        run: find build-artifacts

      - name: Extract package version from artifacts
        id: extract_package_version
        run: |
          set -euo pipefail
          pkg_version=$(bash .github/bin/extract_version.bash build-artifacts)
          echo "package_version=$pkg_version" >> "$GITHUB_OUTPUT"
          echo "Extracted PACKAGE_VERSION: $pkg_version"

      - name: Upload packaged Artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: unsigned-artifacts-${{ needs.setup.outputs.VERSION }}
          path: |
            build-artifacts/**/*.deb
            build-artifacts/**/*.rpm
          overwrite: true
          retention-days: 1

  # Gate job so deploy chain does not depend on a skipped job (e.g. download-s3-artifacts on push).
  artifacts-ready:
    needs: [organize-built-artifacts, download-s3-artifacts]
    if: always() && (needs.organize-built-artifacts.result == 'success' || needs.download-s3-artifacts.result == 'success')
    runs-on: ubuntu-24.04
    outputs:
      PACKAGE_VERSION: ${{ steps.pkg_version.outputs.package_version }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - name: Set PACKAGE_VERSION from whichever job produced artifacts
        id: pkg_version
        run: |
          if [[ "${{ needs.organize-built-artifacts.result }}" == "success" ]]; then
            echo "package_version=${{ needs.organize-built-artifacts.outputs.PACKAGE_VERSION }}" >> "$GITHUB_OUTPUT"
          else
            echo "package_version=${{ needs.download-s3-artifacts.outputs.PACKAGE_VERSION }}" >> "$GITHUB_OUTPUT"
          fi
      - name: Gate
        run: echo "Artifacts ready for sign/deploy"

  sign-artifacts:
    needs: [setup, artifacts-ready]
    if: always() && needs.artifacts-ready.result == 'success'
    uses: aerospike/shared-workflows/.github/workflows/reusable_sign-artifacts.yaml@v3.4.1
    with:
      gh-artifact-name: signed-artifacts-${{ needs.setup.outputs.VERSION }}      
      gh-unsigned-artifacts: unsigned-artifacts-${{ needs.setup.outputs.VERSION }}      
      gh-workflows-ref: "v3.4.1"
    secrets:
      gpg-private-key: ${{ secrets.GPG_SECRET_KEY }}
      gpg-public-key: ${{ secrets.GPG_PUBLIC_KEY }}
      gpg-key-pass: ${{ secrets.GPG_PASS }}

  upload-artifacts-to-jfrog:
    needs: [setup, sign-artifacts]
    if: always() && needs.sign-artifacts.result == 'success'
    uses: aerospike/shared-workflows/.github/workflows/reusable_deploy-artifacts.yaml@v3.4.1
    with:
      jf-project: database
      jf-build-name: "aerospike-server"
      version: ${{ needs.setup.outputs.VERSION }}
      oidc-provider-name: gh-citrusleaf
      oidc-audience: citrusleaf
      gh-artifact-name: signed-artifacts-${{ needs.setup.outputs.VERSION }}      
      gh-retention-days: 1
      dry-run: false
      jf-build-id: ${{ needs.setup.outputs.VERSION }}
      jf-metadata-build-id: ${{ needs.setup.outputs.VERSION }}-metadata
      gh-workflows-ref: "v3.4.1"

  create-release-bundle:
    permissions:
      contents: read
      id-token: write
      attestations: write
    needs: [setup, sign-artifacts, upload-artifacts-to-jfrog, docker-deploy]
    if: always() && needs.upload-artifacts-to-jfrog.result == 'success' && needs.docker-deploy.result == 'success'
    uses: aerospike/shared-workflows/.github/workflows/reusable_create-release-bundle.yaml@v3.4.1
    with:
      jf-project: "database"
      jf-build-names: "aerospike-server:${{ needs.setup.outputs.VERSION }}"
      jf-bundle-name: "aerospike-server"
      oidc-provider-name: gh-citrusleaf
      oidc-audience: citrusleaf
      version: ${{ needs.setup.outputs.BUNDLE_VERSION }}
      gh-workflows-ref: "v3.4.1"
      dry-run: false

  docker-deploy:
    needs: [setup, artifacts-ready, sign-artifacts]
    if: always() && needs.sign-artifacts.result == 'success'
    runs-on: ubuntu-24.04
    outputs:
      time: ${{ steps.timestamp.outputs.time }}
      time_display: ${{ steps.timestamp.outputs.time_display }}
      snyk_summary: ${{ steps.snyk_scan.outputs.summary }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: signed-artifacts-${{ needs.setup.outputs.VERSION }}          
          path: ./signed-artifacts

      - name: Install JFrog CLI
        id: jf
        uses: step-security/setup-jfrog-cli@3054b554c0fb4915b3d58847fb7730c593dbb934 # v5.0.0
        env:
          JF_URL: https://artifact.aerospike.io
          JF_PROJECT: database
        with:
          version: 2.78.8
          oidc-provider-name: database-gh-citrusleaf
          oidc-audience: database-gh-citrusleaf

      - name: Docker login to Artifactory
        uses: step-security/docker-login-action@870af644803bf9f204aed474adbad2958fec048b # v4.1.0
        with:
          registry: artifact.aerospike.io
          username: ${{ steps.jf.outputs.oidc-user }}
          password: ${{ steps.jf.outputs.oidc-token }}

      - name: Checkout aerospike-server.docker repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: aerospike/aerospike-server.docker
          path: pkg/docker
          ref: 3e3e9923050f40f0f860a382f420c726c37a5f3d
          fetch-depth: 1

      - name: Set up QEMU
        uses: step-security/setup-qemu-action@109c6ed9f089be1a250c75fd6a534e30df44e030 # v4.0.0

      - name: Set up Docker Buildx
        uses: step-security/setup-buildx-action@f931205d68723ad9589fd2a7e2ece238bf9de341 # v4.0.0

      - name: Get current timestamp
        id: timestamp
        run: |
          ts_epoch=$(date -u +%s)
          echo "time=$(date -u -d "@${ts_epoch}" '+%Y%m%d%H%M%S')" >> "$GITHUB_OUTPUT"
          echo "time_display=$(date -u -d "@${ts_epoch}" '+%Y-%m-%d %H:%M:%S UTC')" >> "$GITHUB_OUTPUT"

      - name: Build Docker image
        run: |
          set -euo pipefail
          cd pkg/docker
          ./docker-build.sh -t ${{ needs.artifacts-ready.outputs.PACKAGE_VERSION }} -d ubuntu -u ../../signed-artifacts -r artifact.aerospike.io/database-docker-dev-local --no-cache

      - name: Install Snyk CLI
        run: npm install -g snyk

      - name: Test Docker images
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          set -euo pipefail
          cd pkg/docker
          ./test.sh ${{ needs.artifacts-ready.outputs.PACKAGE_VERSION }} -d ubuntu -a amd64 arm64 -c -s

      - name: Upload Snyk scan logs
        id: upload_snyk
        if: always() && hashFiles('pkg/docker/*.snyk') != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: snyk-logs-${{ needs.setup.outputs.VERSION }}
          path: pkg/docker/*.snyk
          retention-days: 14

      - name: Summarize Snyk scan results
        id: snyk_scan
        if: always()
        continue-on-error: true
        env:
          ARTIFACT_URL: ${{ steps.upload_snyk.outputs.artifact-url }}
        run: bash "${GITHUB_WORKSPACE}/.github/bin/summarize_snyk_scan.sh"

      - name: Push Docker image
        run: |
          set -euo pipefail
          cd pkg/docker
          ./docker-build.sh -p ${{ needs.artifacts-ready.outputs.PACKAGE_VERSION }} -d ubuntu -u ../../signed-artifacts -r artifact.aerospike.io/database-docker-dev-local -T ${{ steps.timestamp.outputs.time }}

  promote-to-test:
    needs: [setup, create-release-bundle]
    if: always() && needs.create-release-bundle.result == 'success'
    runs-on: ubuntu-24.04
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40  # v2.19.0
        with:
          egress-policy: audit

      - name: Setup JFrog CLI
        uses: step-security/setup-jfrog-cli@3054b554c0fb4915b3d58847fb7730c593dbb934 # v5.0.0
        env:
          JF_URL: ${{ env.JFROG_URL }}
          JF_PROJECT: ${{ env.JFROG_PROJECT }}
        with:
          oidc-provider-name: database-gh-citrusleaf
          oidc-audience: database-gh-citrusleaf

      - name: Promote release bundle to TEST
        env:
          JFROG_PROJECT: ${{ env.JFROG_PROJECT }}
          RELEASE_BUNDLE_NAME: aerospike-server
          JF_SIGNING_KEY: aerospike
          VERSION: ${{ needs.setup.outputs.BUNDLE_VERSION }}
        run: |
          set -euo pipefail
          # Check if already promoted to TEST
          status=$(jf rt curl -s -XGET "/lifecycle/api/v2/promotion/records/${RELEASE_BUNDLE_NAME}/${VERSION}?project=${JFROG_PROJECT}" | jq -r '.promotions[]? | select(.environment == "TEST") | .status' 2>/dev/null || true)
          if [[ "$status" == "COMPLETED" ]]; then
            echo "Release bundle '${RELEASE_BUNDLE_NAME}:${VERSION}' is already promoted to TEST — skipping."
            exit 0
          fi
          echo "Promoting release bundle '${RELEASE_BUNDLE_NAME}:${VERSION}' to TEST environment..."
          jf rbp \
            --signing-key="${JF_SIGNING_KEY}" \
            --project="${JFROG_PROJECT}" \
            --sync=true \
            "${RELEASE_BUNDLE_NAME}" "${VERSION}" TEST

  notify-slack:
    needs: [setup, artifacts-ready, docker-deploy, promote-to-test]
    if: always() && needs.promote-to-test.result == 'success' && needs.docker-deploy.result == 'success'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      actions: read
    env:
      VERSION: ${{ needs.setup.outputs.VERSION }}
      BUNDLE_VERSION: ${{ needs.setup.outputs.BUNDLE_VERSION }}
      PACKAGE_VERSION: ${{ needs.artifacts-ready.outputs.PACKAGE_VERSION }}
      FULL_PACKAGE_VERSION: ${{ needs.artifacts-ready.outputs.PACKAGE_VERSION }}
      BRANCH: ${{ github.ref_name }}
      TIME: ${{ needs.docker-deploy.outputs.time }}
      TIME_DISPLAY: ${{ needs.docker-deploy.outputs.time_display }}
      RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout (for changelog)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Compute changelog since last successful build
        id: changelog
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          WORKFLOW_REF: ${{ github.workflow_ref }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          CURRENT_RUN_ID: ${{ github.run_id }}
          CURRENT_SHA: ${{ github.sha }}
          MAX_COMMITS: "50"
          PUSH_BEFORE: ${{ github.event.before }}
        run: bash "${GITHUB_WORKSPACE}/.github/bin/changelog_since_last_successful_run.sh"

      - name: Set Slack message text
        id: slack_text
        env:
          SLACK_TITLE: ${{ env.VERSION }} promoted to JFrog TEST
          SLACK_MSG: |
            *Time:* ${{ env.TIME_DISPLAY }}
            *Branch:* ${{ env.BRANCH }}
            *Build Id:* ${{ env.VERSION }}
            *Package Version:* ${{ env.FULL_PACKAGE_VERSION }}
            *Bundle Version:* ${{ env.BUNDLE_VERSION }}
        run: |
          set -euo pipefail
          random_delim() { bash "${GITHUB_WORKSPACE}/.github/bin/random_output_delimiter.sh" "$1"; }
          delimiter="$(random_delim SLACK)"
          {
            echo "title<<${delimiter}"
            echo "$SLACK_TITLE"
            echo "${delimiter}"
            echo "body<<${delimiter}"
            echo "$SLACK_MSG"
            echo "${delimiter}"
          } >> "$GITHUB_OUTPUT"
          # Slack linkifies URLs in mrkdwn (including fenced code). plain_text sections do not auto-link;
          # one block per docker pull keeps each command on its own line.
          reg='artifact.aerospike.io/database-docker-dev-local'
          pv="${PACKAGE_VERSION}"
          ts="${TIME}"

          hd="$(random_delim DH)"
          {
            echo "docker_heading<<${hd}"
            printf '%s\n' '*Docker images:*'
            echo "${hd}"
          } >> "$GITHUB_OUTPUT"

          d1="$(random_delim DP1)"
          {
            echo "docker_pull_1<<${d1}"
            printf 'docker pull %s/aerospike-server-enterprise:%s-%s\n' "$reg" "$pv" "$ts"
            echo "${d1}"
          } >> "$GITHUB_OUTPUT"
          d2="$(random_delim DP2)"
          {
            echo "docker_pull_2<<${d2}"
            printf 'docker pull %s/aerospike-server-federal:%s-%s\n' "$reg" "$pv" "$ts"
            echo "${d2}"
          } >> "$GITHUB_OUTPUT"
          d3="$(random_delim DP3)"
          {
            echo "docker_pull_3<<${d3}"
            printf 'docker pull %s/aerospike-server:%s-%s\n' "$reg" "$pv" "$ts"
            echo "${d3}"
          } >> "$GITHUB_OUTPUT"
          dwf="$(random_delim SLACK_WF)"
          {
            echo "workflow_mrk<<${dwf}"
            echo "<${RUN_URL}|Workflow run>"
            echo "${dwf}"
          } >> "$GITHUB_OUTPUT"

      - name: Build Slack message with Snyk summary
        id: slack_body
        env:
          BASE_BODY: ${{ steps.slack_text.outputs.body }}
          SNYK_SUMMARY: ${{ needs.docker-deploy.outputs.snyk_summary }}
        run: |
          set -euo pipefail
          delimiter="$(bash "${GITHUB_WORKSPACE}/.github/bin/random_output_delimiter.sh" SLACK_BODY)"
          {
            echo "body<<${delimiter}"
            echo "$BASE_BODY"
            echo ""
            echo "*Snyk Container Scan:*"
            if [[ -n "${SNYK_SUMMARY}" ]]; then
              echo "$SNYK_SUMMARY"
            else
              echo "_scan did not run_"
            fi
            echo "${delimiter}"
          } >> "$GITHUB_OUTPUT"

      - name: Send Slack message to QE
        continue-on-error: true
        uses: step-security/slack-github-action@161b08a5bf8cbe9bcdb0ed1386ade4a21fb4c380 # v3.0.1
        with:
          method: chat.postMessage
          token: ${{ secrets.QE_SLACK_BOT_TOKEN }}
          payload: |
            {
              "channel": "${{ secrets.QE_SLACK_CHANNEL }}",
              "text": ${{ toJSON(steps.slack_text.outputs.title) }},
              "blocks": [
                { "type": "header", "text": { "type": "plain_text", "text": ${{ toJSON(steps.slack_text.outputs.title) }}, "emoji": true } },
                { "type": "section", "text": { "type": "mrkdwn", "text": ${{ toJSON(steps.slack_body.outputs.body) }} } },
                { "type": "section", "text": { "type": "mrkdwn", "text": ${{ toJSON(steps.changelog.outputs.body) }} } },
                { "type": "section", "text": { "type": "mrkdwn", "text": ${{ toJSON(steps.slack_text.outputs.docker_heading) }} } },
                { "type": "section", "text": { "type": "plain_text", "text": ${{ toJSON(steps.slack_text.outputs.docker_pull_1) }}, "emoji": false } },
                { "type": "section", "text": { "type": "plain_text", "text": ${{ toJSON(steps.slack_text.outputs.docker_pull_2) }}, "emoji": false } },
                { "type": "section", "text": { "type": "plain_text", "text": ${{ toJSON(steps.slack_text.outputs.docker_pull_3) }}, "emoji": false } },
                { "type": "section", "text": { "type": "mrkdwn", "text": ${{ toJSON(steps.slack_text.outputs.workflow_mrk) }} } }
              ]
            }

      - name: Send Slack message to CORE
        continue-on-error: true
        uses: step-security/slack-github-action@161b08a5bf8cbe9bcdb0ed1386ade4a21fb4c380 # v3.0.1
        with:
          method: chat.postMessage
          token: ${{ secrets.DB_SLACK_BOT_TOKEN }}
          payload: |
            {
              "channel": "${{ secrets.DB_SLACK_CHANNEL }}",
              "text": ${{ toJSON(steps.slack_text.outputs.title) }},
              "blocks": [
                { "type": "header", "text": { "type": "plain_text", "text": ${{ toJSON(steps.slack_text.outputs.title) }}, "emoji": true } },
                { "type": "section", "text": { "type": "mrkdwn", "text": ${{ toJSON(steps.slack_body.outputs.body) }} } },
                { "type": "section", "text": { "type": "mrkdwn", "text": ${{ toJSON(steps.changelog.outputs.body) }} } },
                { "type": "section", "text": { "type": "mrkdwn", "text": ${{ toJSON(steps.slack_text.outputs.docker_heading) }} } },
                { "type": "section", "text": { "type": "plain_text", "text": ${{ toJSON(steps.slack_text.outputs.docker_pull_1) }}, "emoji": false } },
                { "type": "section", "text": { "type": "plain_text", "text": ${{ toJSON(steps.slack_text.outputs.docker_pull_2) }}, "emoji": false } },
                { "type": "section", "text": { "type": "plain_text", "text": ${{ toJSON(steps.slack_text.outputs.docker_pull_3) }}, "emoji": false } },
                { "type": "section", "text": { "type": "mrkdwn", "text": ${{ toJSON(steps.slack_text.outputs.workflow_mrk) }} } }
              ]
            }
